server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Service Worker ─────────────────────────────────────────────────────────
    # Must NEVER be browser-cached — the browser must always re-fetch it to
    # detect updates. A stale SW prevents new versions from being picked up.
    location = /ngsw-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Angular SW metadata file — same policy as the worker itself
    location = /ngsw.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # ── PWA Manifest ───────────────────────────────────────────────────────────
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=86400";  # 1 day
        types { } default_type "application/manifest+json";
    }

    # ── Icons ──────────────────────────────────────────────────────────────────
    location /icons/ {
        add_header Cache-Control "public, max-age=604800, immutable";  # 7 days
    }

    # ── API proxy (AI requests can take 30-90s) ────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    120s;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Angular SPA ────────────────────────────────────────────────────────────
    # All unknown paths fall back to index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/manifest+json image/svg+xml;
}
