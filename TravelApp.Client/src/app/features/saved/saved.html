<div class="saved-page">

  <div class="saved-header">
    <h1>Избранное</h1>
  </div>

  @if (isLoading) {
    <div class="empty">
      <div class="loading-pulse"></div>
      <p>Загружаем...</p>
    </div>
  }

  @if (!isLoading && savedCities.length === 0) {
    <div class="empty">
      <div class="empty-icon-wrap">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <p class="empty-title">Пока ничего не сохранено</p>
      <p class="empty-hint">Нажми на сердечко на карточке города</p>
    </div>
  }

  <div class="cities-grid">
    @for (city of savedCities; track city.id; let i = $index) {
      <div class="city-card" (click)="openCity(city.id)" [style.animation-delay]="i * 0.06 + 's'">
        <div class="card-image" [style.background-image]="'url(' + getPhotoUrl(city) + ')'">
          <div class="card-overlay"></div>
          <button class="remove-btn" (click)="remove($event, city.id)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
          <div class="card-content">
            <span class="card-rating">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="#fbbf24" stroke="none">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
              {{ city.rating }}
            </span>
            <h3 class="card-title">{{ city.name }}</h3>
          </div>
        </div>
      </div>
    }
  </div>

</div>
