services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      # Host-side 5433 → container 5432 to avoid the native Windows
      # PostgreSQL service that already squats on 5432. Container-internal
      # services (e.g. backend below) keep using port 5432 over the
      # docker network — this remap only affects host access.
      - "5433:5432"
    environment:
      POSTGRES_DB: travelappdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Admin2025!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d travelappdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./TravelApp.Api/TravelApp.Api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=travelappdb;Username=postgres;Password=${POSTGRES_PASSWORD:-Admin2025!}"
      OpenRouter__ApiKey: ${OPENROUTER_API_KEY}
      Jwt__Key: ${JWT_KEY:-TravelAppSuperSecretKey2025XYZ123456}
      # Local seed user — auto-created on startup if missing.
      Seed__TestUserEmail:    ${SEED_TEST_USER_EMAIL:-testlocal@example.com}
      Seed__TestUserPassword: ${SEED_TEST_USER_PASSWORD:-Test1234}
      Seed__TestUserName:     ${SEED_TEST_USER_NAME:-Тестовый Локальный}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./TravelApp.Client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
